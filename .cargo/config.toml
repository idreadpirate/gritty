# Minimal-binary build: rebuild std from source at the release profile's
# opt-level=z (the prebuilt std is compiled for speed, not size). This shaves
# ~85 KB and is what takes gritty under 800 KB. Nightly-only (-Z build-std).
#
# `std,panic_abort` — NOT `panic_immediate_abort` — so std::panic::set_hook
# still runs before abort; the RT-22 crash-log depends on it. No behavior change.
[unstable]
build-std = ["std", "panic_abort"]

# Pinning the target makes plain `cargo build/test/clippy` use build-std. The
# release binary lands at target/x86_64-pc-windows-msvc/release/gritty.exe.
[build]
target = "x86_64-pc-windows-msvc"
