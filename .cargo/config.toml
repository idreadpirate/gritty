# Speed-first build: as of the throughput/memory pass the binary-size budget was
# deliberately traded for speed (see docs/ARCHITECTURE.md). The release profile
# is opt-level=3; this file makes the *whole* program — std included — fast.
#
# build-std rebuilds the Rust std library from source so it picks up BOTH the
# release opt-level=3 AND the target-cpu below (the prebuilt std is generic
# x86-64, so its memcpy/format/parse paths would otherwise miss AVX2). We dropped
# the former `build-std-features = ["optimize_for_size"]` so std is now compiled
# for speed, not size.
#
# `std,panic_abort` — NOT `panic_immediate_abort` — so std::panic::set_hook still
# runs before abort; the RT-22 crash-log depends on it.
[unstable]
build-std = ["std", "panic_abort"]

# target-cpu=x86-64-v3 enables AVX2/FMA/BMI2 so the compiler autovectorizes the
# software-raster hot loops (background fills, glyph blits) and the VT parser.
# Set under [build] (not [target.*]) so it also reaches the build-std rebuild.
# PORTABILITY FLOOR: x86-64-v3 = Haswell (2013+); the binary will SIGILL on older
# CPUs. Fine for this machine; switch to runtime-detected AVX2 if broadly shipped.
[build]
target = "x86_64-pc-windows-msvc"
rustflags = ["-C", "target-cpu=x86-64-v3"]
